services:
  pdb:
    image: postgres:17
    ports:
      - 5438:5432
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
  web:
    build: .
    image: django-web
    ports:
      - 8000:8000
    depends_on:
      - pdb
    command: python3 /app/manage.py runserver 0.0.0.0:8000
